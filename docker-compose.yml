version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: quran_donation_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    command: python run.py
    env_file:
      - .env
    depends_on:
      - postgres

  api:
    build: .
    command: python -m quran_donation_bot.app.api_main
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

volumes:
  postgres_data:

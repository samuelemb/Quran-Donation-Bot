<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Quran Donation</title>
    <link rel="stylesheet" href="{{ url_for('static', path='admin.css') }}">
</head>
<body class="login-body">
    <div class="login-pattern"></div>
    <section class="login-card">
        <div class="login-icon">Q</div>
        <h1>Quran Donation Admin Portal</h1>
        <p>Secure access for management staff</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login" class="login-form">
            <label>Email or Username</label>
            <input type="email" name="email" placeholder="e.g. admin@qurandonate.org" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="login-footer">Protected by high-level encryption. Authorized personnel only.</div>
    </section>
</body>
</html>
